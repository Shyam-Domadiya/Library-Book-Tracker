<div class="dashboard">
    <header class="home-header">
        <h1>Welcome to LibTracker</h1>
        <p class="subtitle">Efficiently manage and track your library collection with ease.</p>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon books">📚</div>
            <div class="stat-info">
                <span class="stat-label">Total Books</span>
                <span class="stat-value">{{totalBooks}}</span>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon available">✅</div>
            <div class="stat-info">
                <span class="stat-label">Available</span>
                <span class="stat-value text-success">{{availableBooks}}</span>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon checked">⏳</div>
            <div class="stat-info">
                <span class="stat-label">Checked Out</span>
                <span class="stat-value text-warning">{{checkedOutBooks}}</span>
            </div>
        </div>
    </div>

    <div class="action-section card mt-large">
        <h3>Quick Actions</h3>
        <div class="action-buttons">
            <button routerLink="/books" class="primary">
                <span>📖</span> Browse Collection
            </button>
            <button routerLink="/add-book" class="outline">
                <span>➕</span> Add New Book
            </button>
        </div>
    </div>
</div>
