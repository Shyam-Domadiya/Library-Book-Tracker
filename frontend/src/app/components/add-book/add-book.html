<div class="form-container animate-fade-in-up">
    <div class="card form-card glass-card">
        <div class="form-header">
            <h2 class="text-gradient">{{ isEditMode ? 'Edit Book' : 'Add New Book' }}</h2>
            <p class="subtitle">{{ isEditMode ? 'Modify the details of your book below.' : 'Enter the details below to
                expand the library collection.' }}</p>
        </div>

        <form (submit)="saveBook()" class="smart-form">
            <div class="form-group stagger-1">
                <label for="title">Book Title</label>
                <div class="input-wrapper">
                    <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="1em" height="1em"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg></span>
                    <input id="title" [(ngModel)]="book.title" name="title" placeholder="e.g. The Great Gatsby" required
                        #title="ngModel">
                </div>
            </div>

            <div class="form-row stagger-2">
                <div class="form-group">
                    <label for="author">Author</label>
                    <div class="input-wrapper">
                        <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="1em" height="1em"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></span>
                        <input id="author" [(ngModel)]="book.author" name="author"
                            placeholder="e.g. F. Scott Fitzgerald" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <div class="input-wrapper">
                        <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="1em" height="1em"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" /></svg></span>
                        <select id="category" [(ngModel)]="book.category" name="category" required class="custom-select">
                            <option value="" disabled selected>Select Category</option>
                            <option value="Programming">Programming</option>
                            <option value="Fiction">Fiction</option>
                            <option value="History">History</option>
                            <option value="Science">Science</option>
                            <option value="Biography">Biography</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-group checkbox-group stagger-3">
                <label class="toggle">
                    <input type="checkbox" [(ngModel)]="book.available" name="available">
                    <span class="toggle-slider">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="1em" height="1em" class="check-icon"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </span>
                    <span class="toggle-label text-main">Mark as available for immediate borrowing</span>
                </label>
            </div>

            <div class="form-actions stagger-4">
                <button type="submit" class="primary full-width">
                    @if (isEditMode) { <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="1em" height="1em" style="vertical-align: middle;"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg></span> }
                    @else { <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="1em" height="1em" style="vertical-align: middle;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg></span> } 
                    {{ isEditMode ? 'Save Changes' : 'Confirm & Add Book' }}
                </button>
            </div>
        </form>
    </div>
</div>
