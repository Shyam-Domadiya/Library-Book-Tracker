<div class="login-container animate-fade-in-up">
    <div class="card login-card glass-card">
        <div class="login-header">
            <div class="logo-circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="1em" height="1em"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg></div>
            <h2 class="text-gradient">Create Account</h2>
            <p class="subtitle">Join the LibTracker community today.</p>
        </div>

        <form (submit)="onRegister()" class="smart-form">

            <div class="form-group stagger-1">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="1em" height="1em"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></span>
                    <input id="username" [(ngModel)]="username" name="username" placeholder="Use for login" required
                        (input)="errorMessage = ''">
                </div>
            </div>

            <div class="form-group stagger-2">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="1em" height="1em"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg></span>
                    <input id="password" type="password" [(ngModel)]="password" name="password"
                        placeholder="Min 4 characters" required (input)="errorMessage = ''">
                </div>
            </div>

            <div class="form-group stagger-3">
                <label>I am a...</label>
                <div class="role-selector">
                    <label class="role-option" [class.active]="selectedRole === 'Student'">
                        <input type="radio" name="role" value="Student" [(ngModel)]="selectedRole">
                        <span class="role-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="1em" height="1em"><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5z" /><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" /> <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222" /></svg></span>
                        <span class="role-text">Student</span>
                    </label>
                    <label class="role-option" [class.active]="selectedRole === 'Librarian'">
                        <input type="radio" name="role" value="Librarian" [(ngModel)]="selectedRole">
                        <span class="role-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="1em" height="1em"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg></span>
                        <span class="role-text">Librarian</span>
                    </label>
                </div>
            </div>

            <div *ngIf="errorMessage" class="error-text text-danger stagger-4">
                {{errorMessage}}
            </div>

            <button type="submit" class="primary full-width mt-medium stagger-4" [disabled]="!username || !password">
                Sign Up & Start Tracking <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="1em" height="1em" style="vertical-align: middle; margin-left: 4px;"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" /></svg>
            </button>

            <div class="login-footer mt-medium stagger-5">
                <p>Already have an account? <a routerLink="/login">Login here</a></p>
            </div>
        </form>
    </div>
</div>
